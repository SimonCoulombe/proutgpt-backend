# /etc/nginx/sites-available/proutgpt.conf
#
# Replace api.proutgpt.com with your actual domain (or VM public IP).
# After placing this file, enable it and reload nginx:
#
#   sudo ln -s /etc/nginx/sites-available/proutgpt.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# To add HTTPS with Let's Encrypt:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d api.proutgpt.com

server {
    listen 80;
    server_name api.proutgpt.com;   # <-- change to your domain or public IP

    # Proxy OpenRouter API calls to Flask
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Proxy Ollama API calls directly to the local Ollama daemon
    location /ollama/ {
        rewrite ^/ollama/(.*) /$1 break;
        proxy_pass         http://127.0.0.1:11434;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 300s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:5000/health;
    }
}
